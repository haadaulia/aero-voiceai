<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aero — Voice to Action</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="noise"></div>
  <div class="grid-bg"></div>

  <header>
    <div class="logo">AERO</div>
    <div class="tagline">voice synthesis engine</div>
  </header>

  <main>

    <div class="hero-text">
      <span class="hero-line">speak</span>
      <span class="hero-line accent">messy.</span>
      <span class="hero-line">send</span>
      <span class="hero-line accent2">perfect.</span>
    </div>

    <div class="panel">

      <div class="mic-section">
        <button id="recordBtn" class="mic-btn" title="Click to speak">
          <div class="mic-rings">
            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <div class="ring ring3"></div>
          </div>
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="2" width="6" height="13" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
        <button id="stopBtn" class="stop-btn" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
        <div id="mic-label" class="mic-label">tap to speak</div>
      </div>

      <div class="boxes">
        <div class="box-wrap">
          <div class="box-label">
            <span class="dot dot-red"></span>
            raw input
          </div>
          <div id="transcript" class="box messy">your messy thoughts appear here...</div>
        </div>

        <div class="arrow-wrap">
          <div class="arrow">
            <svg viewBox="0 0 40 20" fill="none">
              <path d="M0 10 L32 10 M24 2 L32 10 L24 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="arrow-label">groq synthesis</div>
        </div>

        <div class="box-wrap">
          <div class="box-label">
            <span class="dot dot-green"></span>
            polished output
          </div>
          <div id="refined" class="box polished">your professional email appears here...</div>
        </div>
      </div>

      <div class="actions">
        <button id="sendBtn" class="send-btn" disabled>
          <span class="send-text">execute workflow
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
          <span class="send-sponsors">via TinyFish + Gradium</span>
        </button>
      </div>

      <div id="status" class="status"></div>

    </div>

    <div class="sponsors">
      <span>powered by</span>
      <span class="sponsor-tag">Groq</span>
      <span class="divider">+</span>
      <span class="sponsor-tag">TinyFish</span>
      <span class="divider">+</span>
      <span class="sponsor-tag">Gradium</span>
    </div>

  </main>

  <script>
    let recognition;
    let fullTranscript = '';

    const recordBtn = document.getElementById('recordBtn');
    const stopBtn   = document.getElementById('stopBtn');
    const transcriptBox = document.getElementById('transcript');
    const refinedBox    = document.getElementById('refined');
    const sendBtn  = document.getElementById('sendBtn');
    const status   = document.getElementById('status');
    const micLabel = document.getElementById('mic-label');

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = true;       // keeps listening through pauses
      recognition.interimResults = true;   // shows words as you speak

      recognition.onresult = (event) => {
        let interim = '';
        fullTranscript = '';

        for (let i = 0; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            fullTranscript += event.results[i][0].transcript + ' ';
          } else {
            interim += event.results[i][0].transcript;
          }
        }

        // Show combined final + interim in real time
        transcriptBox.textContent = (fullTranscript + interim).trim();
        transcriptBox.classList.add('has-content');
      };

      recognition.onerror = (event) => {
        // Ignore 'no-speech' — it fires on pauses with continuous mode
        if (event.error === 'no-speech') return;
        setStatus(`mic error: ${event.error}`, 'error');
        stopRecording();
      };

      // With continuous=true, onend only fires when we call .stop()
      recognition.onend = () => {
        stopRecording();
        if (fullTranscript.trim()) {
          refine(fullTranscript.trim());
        }
      };

    } else {
      setStatus('use Chrome for speech recognition', 'error');
      recordBtn.disabled = true;
    }

    recordBtn.onclick = () => {
      fullTranscript = '';
      transcriptBox.textContent = 'listening...';
      transcriptBox.classList.remove('has-content');
      refinedBox.textContent = 'your professional email appears here...';
      refinedBox.classList.remove('has-content');
      sendBtn.disabled = true;

      recognition.start();
      recordBtn.classList.add('recording');
      recordBtn.disabled = true;
      stopBtn.disabled = false;
      micLabel.textContent = 'listening — tap stop when done';
      setStatus('');
    };

    // User manually stops — triggers onend which calls refine
    stopBtn.onclick = () => recognition.stop();

    function stopRecording() {
      recordBtn.classList.remove('recording');
      recordBtn.disabled = false;
      stopBtn.disabled = true;
      micLabel.textContent = 'tap to speak';
    }

    async function refine(transcript) {
      setStatus('synthesising...', 'loading');
      refinedBox.textContent = '...';
      try {
        const res = await fetch('/refine', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript }),
        });
        if (!res.ok) throw new Error(`/refine failed: ${res.status}`);
        const { refined } = await res.json();
        refinedBox.textContent = refined;
        refinedBox.classList.add('has-content');
        sendBtn.disabled = false;
        setStatus('');
      } catch (err) {
        setStatus(`error: ${err.message}`, 'error');
      }
    }

    sendBtn.onclick = async () => {
      sendBtn.disabled = true;
      setStatus('executing workflow...', 'loading');

      try {
        await fetch('/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refined: refinedBox.textContent }),
        });

        setStatus('email drafted — playing gradium confirmation...', 'loading');

        const confirmRes = await fetch('/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refined: refinedBox.textContent }),
        });

        if (!confirmRes.ok) throw new Error(`/confirm failed: ${confirmRes.status}`);

        const audioBlob = await confirmRes.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        new Audio(audioUrl).play();

        setStatus('✓ done', 'success');
      } catch (err) {
        setStatus(`error: ${err.message}`, 'error');
      } finally {
        sendBtn.disabled = false;
      }
    };

    function setStatus(msg, type = '') {
      status.textContent = msg;
      status.className = 'status ' + type;
    }
  </script>
</body>
</html>
