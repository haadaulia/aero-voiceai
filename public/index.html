<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Aero — Voice to Action</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="noise"></div>
  <div class="grid-bg"></div>

  <header>
    <div class="logo">AERO</div>
    <div class="tagline">voice synthesis engine</div>
  </header>

  <main>
    <div class="hero-text">
      <span class="hero-line">speak</span>
      <span class="hero-line accent">messy.</span>
      <span class="hero-line">send</span>
      <span class="hero-line accent2">perfect.</span>
    </div>

    <div class="panel">
      <div class="mic-section">
        <button id="recordBtn" class="mic-btn" title="Click to speak">
          <div class="mic-rings">
            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <div class="ring ring3"></div>
          </div>
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="2" width="6" height="13" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
        <button id="stopBtn" class="stop-btn" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
        <div id="mic-label" class="mic-label">tap to speak</div>
      </div>

      <div class="boxes">
        <div class="box-wrap">
          <div class="box-label"><span class="dot dot-red"></span>raw input</div>
          <div id="transcript" class="box messy">your messy thoughts appear here...</div>
        </div>
        <div class="arrow-wrap">
          <div class="arrow">
            <svg viewBox="0 0 40 20" fill="none">
              <path d="M0 10 L32 10 M24 2 L32 10 L24 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="arrow-label">groq synthesis</div>
        </div>
        <div class="box-wrap">
          <div class="box-label"><span class="dot dot-green"></span>polished output</div>
          <div id="refined" class="box polished">your professional email appears here...</div>
        </div>
      </div>

      <div id="email-meta" class="email-meta" style="display:none;">
        <div class="meta-pill">
          <span class="meta-key">to</span>
          <span id="meta-to" class="meta-val">-</span>
        </div>
        <div class="meta-pill">
          <span class="meta-key">subject</span>
          <span id="meta-subject" class="meta-val">-</span>
        </div>
      </div>

      <div class="actions">
        <button id="sendBtn" class="send-btn" disabled>
          <span class="send-text">open in gmail
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </span>
          <span class="send-sponsors">via Gradium + Gmail</span>
        </button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="sponsors">
      <span>powered by</span>
      <span class="sponsor-tag">Groq</span>
      <span class="divider">+</span>
      <span class="sponsor-tag">Gradium</span>
      <span class="divider">+</span>
      <span class="sponsor-tag">Gmail</span>
    </div>
  </main>

<script>
  let isRecording = false;
  let finalTranscript = '';
  let recognition;
  let silenceTimer;
  let currentEmail = { refined: '', subject: '', to: '' };
  let currentAudio = null;

  const recordBtn     = document.getElementById('recordBtn');
  const stopBtn       = document.getElementById('stopBtn');
  const transcriptBox = document.getElementById('transcript');
  const refinedBox    = document.getElementById('refined');
  const sendBtn       = document.getElementById('sendBtn');
  const status        = document.getElementById('status');
  const micLabel      = document.getElementById('mic-label');
  const emailMeta     = document.getElementById('email-meta');
  const metaTo        = document.getElementById('meta-to');
  const metaSubject   = document.getElementById('meta-subject');

  stopBtn.style.display = 'none';

  function stopAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
  }

  function setStatus(msg, type) {
    status.textContent = msg;
    status.className = 'status ' + (type || '');
  }

  function gmailComposeUrl(to, subject, body) {
    const p = new URLSearchParams();
    p.set('view', 'cm');
    p.set('fs', '1');
    if (to) p.set('to', to);
    if (subject) p.set('su', subject);
    if (body) p.set('body', body);
    return 'https://mail.google.com/mail/?' + p.toString();
  }

  // --- Recording ---

  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    setStatus('use Chrome for speech recognition', 'error');
    recordBtn.disabled = true;
  }

  function createRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'en-US';
    r.onresult = (event) => {
      let interim = '';
      finalTranscript = '';
      for (let i = 0; i < event.results.length; i++) {
        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
        else interim += event.results[i][0].transcript;
      }
      transcriptBox.textContent = (finalTranscript + interim).trim();
      transcriptBox.classList.add('has-content');
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(autoStop, 5000);
    };
    r.onerror = (e) => {
      if (e.error === 'no-speech') return;
      setStatus('mic error: ' + e.error, 'error');
      forceStop();
    };
    r.onend = () => { if (isRecording) try { r.start(); } catch(e) {} };
    return r;
  }

  recordBtn.onclick = () => {
    stopAudio();
    if (isRecording) { autoStop(); return; }

    finalTranscript = '';
    transcriptBox.textContent = 'listening...';
    transcriptBox.classList.remove('has-content');
    refinedBox.textContent = 'your professional email appears here...';
    refinedBox.classList.remove('has-content');
    emailMeta.style.display = 'none';
    sendBtn.disabled = true;
    setStatus('');

    recognition = createRecognition();
    isRecording = true;
    try { recognition.start(); } catch(e) { setStatus('could not start mic', 'error'); isRecording = false; return; }

    recordBtn.classList.add('recording');
    micLabel.textContent = 'listening — tap again or wait 5s to stop';
    silenceTimer = setTimeout(autoStop, 5000);
  };

  function autoStop() {
    clearTimeout(silenceTimer);
    if (!isRecording) return;
    forceStop();
    const text = finalTranscript.trim() || transcriptBox.textContent.trim();
    if (text && text !== 'listening...') refine(text);
    else setStatus('nothing captured — try again', 'error');
  }

  function forceStop() {
    isRecording = false;
    clearTimeout(silenceTimer);
    if (recognition) { try { recognition.stop(); } catch(e) {} try { recognition.abort(); } catch(e) {} }
    recordBtn.classList.remove('recording');
    recordBtn.disabled = false;
    micLabel.textContent = 'tap to speak';
  }

  // --- Refine ---

  async function refine(transcript) {
    setStatus('synthesising...', 'loading');
    refinedBox.textContent = '...';
    try {
      const res = await fetch('/refine', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript }),
      });
      if (!res.ok) throw new Error('refine failed: ' + res.status);
      const data = await res.json();
      currentEmail = { refined: data.refined, subject: data.subject, to: data.to };
      refinedBox.textContent = data.refined;
      refinedBox.classList.add('has-content');
      metaTo.textContent = data.to || 'not specified';
      metaSubject.textContent = data.subject || 'not specified';
      emailMeta.style.display = 'flex';
      sendBtn.disabled = false;
      setStatus('ready — press button to open gmail', 'success');
    } catch (err) {
      setStatus('error: ' + err.message, 'error');
    }
  }

  // --- Send ---

  sendBtn.onclick = () => {
    if (!currentEmail.refined) return;
    stopAudio();

    // Open Gmail immediately — sync, no awaits before this
    window.open(gmailComposeUrl(currentEmail.to, currentEmail.subject, currentEmail.refined), '_blank');
    setStatus('gmail opened', 'success');

    // Play audio — fire and forget with .then(), no async/await
    fetch('/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject: currentEmail.subject, to: currentEmail.to }),
    })
    .then(r => r.blob())
    .then(blob => {
      currentAudio = new Audio(URL.createObjectURL(blob));
      currentAudio.play();
      currentAudio.onended = () => { currentAudio = null; };
    })
    .catch(() => {});
  };
</script>
</body>
</html>
